name: Build and Release NBPxeServer

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            python-arch: x64
            output-name: NBPxeServer-x64.exe
          - arch: x86
            python-arch: x86
            output-name: NBPxeServer-x86.exe

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for tag-based versioning

    - name: Set up Python 3.8 (${{ matrix.python-arch }})
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        architecture: ${{ matrix.python-arch }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka zstandard ordered-set

    - name: Patch Nuitka zstd memory usage (x86 only)
      # 仅在 x86 环境下触发，把 Nuitka 写死的最高压缩级(22)降到10，避免32位系统内存溢出
      if: matrix.arch == 'x86'
      shell: python
      run: |
        import re
        import pathlib
        import nuitka.tools.onefile_compressor.OnefileCompressor as oc

        # 获取 Nuitka 压缩器模块的源码路径
        f = pathlib.Path(oc.__file__)
        content = f.read_text(encoding='utf-8')
        
        # 降级 zstd 压缩参数
        patched_content = re.sub(r'level\s*=\s*\d+', 'level=10', content)
        f.write_text(patched_content, encoding='utf-8')
        
        print("Successfully patched Nuitka zstd compression level to 10 for x86 build.")

    - name: Compile with Nuitka
      run: >
        python -m nuitka 
        --assume-yes-for-downloads 
        --onefile 
        --lto=yes 
        --enable-plugin=anti-bloat 
        --windows-console-mode=disable 
        --enable-plugin=tk-inter 
        --windows-uac-admin 
        --output-dir=dist 
        --output-filename=${{ matrix.output-name }} 
        --windows-icon-from-ico=icon.ico 
        NBPxeServer.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output-name }}
        path: dist/${{ matrix.output-name }}

  release:
    name: Create Tag and Release
    permissions:
      contents: write
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        files: artifacts/**/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}